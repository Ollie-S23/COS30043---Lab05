<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Event Information (Searchable Table)">
    <meta name="author" content="Oliver Scott">
    <title>Insight Hire</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link href="bootstrap/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <div class="col-12">
                <h1>Insight Hire</h1>
            </div>
        </div>
    </header>

    <main>
        <div id="app">
            <section class="container">
                <div class="row">
                    <div class="col-4 grid-demo">
                        <h2>Job Explorer</h2>
                        <div>
                            <p><router-link to="/job-overview" class="centerItems">Overview</router-link></p>
                            <p v-for="job in jobs" :key="job.job_id">
                                <router-link :to="'/job/' + job.job_id" class="centerItems">{{ job.job_id }}</router-link>
                            </p>
                        </div>
                    </div>
                    <div class="col-8 grid-demo">
                        <router-view></router-view>  <!-- content renders here -->
                    </div>
                </div>
                <div class="row">
                    <div class="col-7 grid-demo">
                        <h2>To-Do List</h2>
                        <div class="row">
                            <input type="text" class="col-9" id="tdItem" v-model="newItem" placeholder="Enter a task"> 
                            <button class="btn btn-primary col-3" @click="addTask">Add Task</button>
                        </div>
                            <todo v-for="(t, i) in todos" :key="i" :item="t.item" :priority="t.priority" :toggle-priority="t.togglePriority" :index="i" @delete="deleteTaskHandler" @toggle="toggleTaskHandler"></todo>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="col-12">
                <p>&copy; 2025 Oliver Scott. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="js/vue.js"></script>
    <script src="node_modules/vue-router/dist/vue-router.global.js"></script>
    <script src="js/components/JobOverview.js"></script>
    <script src="js/components/JobList.js"></script>
    <script src="js/components/JobDetail.js"></script>
    <script src="js/components/todo.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
